# ~/.config/shellclaw/config.toml
# shellclaw configuration — created by the onboarding wizard on first run.
# All settings below are optional; shown values are the defaults.

[provider]
# Which LLM backend to use.
# Options: ollama | openai | anthropic | groq | openrouter | custom
name      = "ollama"

# Model name as understood by the chosen provider.
model     = "qwen2.5:14b"

# Base URL for the provider API.
# Ollama default shown below. For openai use https://api.openai.com/v1
# For groq use https://api.groq.com/openai/v1
base_url  = "http://localhost:11434/v1"

# API key. Ignored by Ollama. Required for all cloud providers.
api_key   = "ollama"

# Sampling temperature. Omit to use shellclaw defaults (0.2 for Ollama).
# temperature = 0.2

# Ollama only: sent as request options.num_ctx (ignored for cloud providers).
num_ctx = 32000

[agent]
# Maximum number of observe-loop iterations per task.
# The LLM may use fewer — this is a safety ceiling, not a target.
max_iterations   = 10

# Command output is truncated at this size to prevent context flooding.
max_output_bytes = 8192

# Per-command subprocess timeout in seconds.
timeout_seconds  = 10

[ui]
# Always show raw terminal output in the execution log panel.
show_raw_output = true

# Colour theme. Options: dark | light
theme = "dark"

[health]
# Run a passive system health scan every time shellclaw opens.
# Results appear in the banner at the top of the screen.
snapshot_on_launch = true

[safety]
# Automatically back up any file before shellclaw modifies it.
# Backups are stored in ~/.local/share/shellclaw/backups/
auto_backup = true

# Prune backups older than this many days.
backup_retention_days = 30

# Model for `shellclaw check` only (same provider as [provider]). Omit to use [provider].model.
# Example: use a smaller/faster model for quick safety checks while the TUI uses a larger one.
# check_model = "qwen2.5:7b"

# Extra command basenames allowed by run_safe (comma-separated), merged with the built-in list.
# extra_allowed_command_bases = "btop,ncdu"
